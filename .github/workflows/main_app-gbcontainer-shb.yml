# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-gbcontainer-shb

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: containershb.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_1ADE790DA20D4ED6A7B1046560D8D21C }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_627D038CB86E4AB68C6109DFE4D6D8EE }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: containershb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_1ADE790DA20D4ED6A7B1046560D8D21C }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-gbcontainer-shb'
          slot-name: 'Production'
          images: 'containershb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_1ADE790DA20D4ED6A7B1046560D8D21C }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_6873DA1B775443DDA25F5704F0DFFE3C }}