# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-gb-container-initial

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: containershb.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_25712325E95744DDAF30A6F94248B5C6 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_B290A5738B4B4FBD99018F4154F4AF45 }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: containershb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_25712325E95744DDAF30A6F94248B5C6 }}/containershb/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-gb-container-initial'
          slot-name: 'staging'
          images: 'containershb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_25712325E95744DDAF30A6F94248B5C6 }}/containershb/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_273F1C1605C343EAACF2C6AF7279ECE9 }}