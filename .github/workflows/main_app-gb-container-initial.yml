# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy container app to Azure Web App - app-gb-container-initial

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v2

      - name: Log in to container registry
        uses: docker/login-action@v2
        with:
          registry: containershb.azurecr.io/
          username: ${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_D0629159EFCE4BE6A5A6F7ACCB963639 }}
          password: ${{ secrets.AZUREAPPSERVICE_CONTAINERPASSWORD_48E2C3EE09DE4C36986DBDD4DF43D00D }}

      - name: Build and push container image to registry
        uses: docker/build-push-action@v3
        with:
          context: .
          push: true
          tags: containershb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_D0629159EFCE4BE6A5A6F7ACCB963639 }}/guestbook:${{ github.sha }}
          file: ./Dockerfile

  deploy:
    runs-on: ubuntu-latest
    
    needs: build
    
    steps:
      
      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v2
        with:
          app-name: 'app-gb-container-initial'
          slot-name: 'Production'
          images: 'containershb.azurecr.io/${{ secrets.AZUREAPPSERVICE_CONTAINERUSERNAME_D0629159EFCE4BE6A5A6F7ACCB963639 }}/guestbook:${{ github.sha }}'
          publish-profile: ${{ secrets.AZUREAPPSERVICE_PUBLISHPROFILE_BA5A29B6B2AE4BDDBA905CD910EC32FF }}